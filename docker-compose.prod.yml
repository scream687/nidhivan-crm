services:
  db:
    image: postgres:16-alpine
    container_name: nidhivan_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: nidhivan_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: nidhivan_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env.prod
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - internal
      - public

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: nidhivan_web
    restart: unless-stopped
    depends_on:
      - api
    env_file: .env.prod
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - internal
      - public

  nginx:
    image: nginx:alpine
    container_name: nidhivan_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    networks:
      - public

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
